services:
  # ── Backend API ─────────────────────────────────────────────────────
  - type: web
    name: whatsapp-crm-backend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-crm-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: whatsapp-crm-db
          property: connectionString
      - key: WA_VERIFY_TOKEN
        generateValue: true
      - key: IG_VERIFY_TOKEN
        generateValue: true
      - key: META_API_VERSION
        value: v20.0
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://signhify-crm.vercel.app
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: META_APP_ID
        value: "YOUR_META_APP_ID_HERE"
      - key: META_APP_SECRET
        value: "YOUR_META_APP_SECRET_HERE"
      - key: FRONTEND_URL
        value: https://signhify-crm.vercel.app
      - key: ADMIN_SECRET
        value: "crm-admin-setup-key-2026"
      - key: ADMIN_ENABLED
        value: "false"

  # ── Frontend ────────────────────────────────────────────────────────
  - type: web
    name: whatsapp-crm-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://whatsapp-crm-backend-bv1j.onrender.com/api/v1
