services:
  # ── PostgreSQL Database ─────────────────────────────────────────────
  - type: database
    name: whatsapp-crm-db
    databaseName: whatsapp_crm
    user: whatsapp_crm_user
    plan: free
    ipAllowList: []

  # ── Backend API ─────────────────────────────────────────────────────
  - type: web
    name: whatsapp-crm-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate --data-proxy && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-crm-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: whatsapp-crm-db
          property: connectionString
      - key: WA_VERIFY_TOKEN
        generateValue: true
      - key: IG_VERIFY_TOKEN
        generateValue: true
      - key: META_API_VERSION
        value: v20.0
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://whatsapp-crm-frontend.onrender.com
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

  # ── Frontend ────────────────────────────────────────────────────────
  - type: web
    name: whatsapp-crm-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://whatsapp-crm-backend.onrender.com
